backend:
  name: git-gateway
  branch: master

media_folder: "assets/uploads"
public_folder: "/assets/uploads"
locale: "he"
display_url: https://maorbez.github.io/globes-site/

collections:
  - name: "site"
    label: "תוכן האתר"
    files:
      - name: "properties"
        label: "נכסים (דירות)"
        file: "properties.json"
        format: "json"
        fields:
          - label: "רשימת הנכסים"
            name: "properties"
            label_singular: "נכס"
            widget: "list"
            summary: "{{fields.title}} — {{fields.location}}"
            fields:
              - { label: "מזהה (מספר ייחודי)", name: "id", widget: "number", value_type: "int" }
              - { label: "כותרת", name: "title", widget: "string" }
              - label: "סוג עסקה"
                name: "type"
                widget: "select"
                default: "sale"
                options:
                  - { label: "מכירה", value: "sale" }
                  - { label: "השכרה", value: "rent" }
                  - { label: "מסחרי", value: "commercial-sale" }
              - { label: "מחיר (מספרים עם פסיקים)", name: "price", widget: "string", hint: "לדוגמה: 4,200,000" }
              - { label: "תווית מחיר", name: "priceLabel", widget: "string", hint: "לדוגמה: ₪ 4,200,000" }
              - { label: "מיקום", name: "location", widget: "string", hint: "עיר, שכונה — לדוגמה: תל אביב, פלורנטין" }
              - { label: "חדרים", name: "rooms", widget: "number", value_type: "int", required: false }
              - { label: "חדרי רחצה", name: "baths", widget: "number", value_type: "int", required: false }
              - { label: 'שטח (מ"ר)', name: "sqm", widget: "number", value_type: "int" }
              - { label: "תיאור", name: "desc", widget: "text" }
              - { label: "מאפיין בולט", name: "extra", widget: "string", required: false, hint: "לדוגמה: מרפסת, חצר פרטית" }
              - { label: "מוצג באתר?", name: "active", widget: "boolean", default: true }
              - { label: "אימוji ראשי", name: "emoji", widget: "string", default: "🏠", required: false }
              - { label: "רקע (גרדיאנט צבע)", name: "bg", widget: "string", default: "linear-gradient(135deg,#1a3a5c,#2d6a9f)", required: false }
              - { label: "קו רוחב למפה", name: "lat", widget: "number", value_type: "float", required: false }
              - { label: "קו אורך למפה", name: "lng", widget: "number", value_type: "float", required: false }
              - label: "תמונות ממוזערות"
                name: "thumbs"
                widget: "list"
                required: false
                default: ["🏠", "🛋️", "🚿", "🌅"]
                field: { label: "פריט", name: "item", widget: "string" }
              - label: "פרטי קשר"
                name: "agent"
                widget: "object"
                required: false
                collapsed: true
                fields:
                  - { label: "שם", name: "name", widget: "string", default: "גלובס נכסים" }
                  - { label: "תפקיד", name: "title", widget: "string", default: "צרו קשר", required: false }
                  - { label: "צבע", name: "color", widget: "string", default: "#1565C0", required: false }
                  - { label: "ראשי תיבות", name: "init", widget: "string", default: "ג", required: false }
                  - { label: "טלפון", name: "phone", widget: "string", default: "054-802-6123" }
